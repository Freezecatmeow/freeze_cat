<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>感谢扩列喵~</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e2ecff 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
    }

    .container {
      background: #fff;
      max-width: 800px;
      width: 100%;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 30, 100, 0.08);
      text-align: center;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      color: #1d2129;
      margin-bottom: 24px;
    }

    .image-box {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">感谢扩列喵~</div>
    <div class="image-box">
      <img src="https://free.boltp.com/2026/04/16/69e065f7af869.webp" alt="图片">
    </div>
  </div>
</body>
</html>
