<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片展示</title>
<style>
  body{
    background:#f6f8fa;
    text-align:center;
    padding:40px 20px;
    font-family:Arial,sans-serif;
  }
  img{
    max-width:100%;
    height:auto;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
  }
  .link{
    margin-top:20px;
    color:#666;
    word-break:break-all;
  }
</style>
</head>
<body>

<h1>图片展示</h1>
<img id="showImg" alt="图片">
<div class="link" id="imgUrl"></div>

<script>
// 把你的图片链接放在这里
const imageUrl = "https://free.boltp.com/2026/04/16/69e065f7af869.webp";

document.getElementById("showImg").src = imageUrl;
document.getElementById("imgUrl").innerText = imageUrl;
</script>

</body>
</html>
