<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的共享图片</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f6f8fa;padding:30px 20px;font-family:Arial}
.main{max-width:900px;margin:0 auto;text-align:center}
h1{margin-bottom:20px;color:#333}
.upload-area{margin:20px 0}
#fileInput{display:none}
.upload-btn{
  padding:10px 20px;background:#0071e3;color:#fff;
  border:none;border-radius:8px;cursor:pointer
}
#imgBox{margin-top:30px}
#imgBox img{
  max-width:100%;max-height:70vh;
  border-radius:12px;box-shadow:0 4px 20px #00000015
}
.tip{margin-top:10px;color:#666;font-size:14px}
</style>
</head>
<body>
<div class="main">
  <h1>共享图片展示</h1>
  <div class="upload-area">
    <label class="upload-btn" for="fileInput">上传图片</label>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <div id="imgBox"></div>
  <div class="tip">上传后，所有人打开该网址都能看到这张图</div>
</div>

<script>
const STORAGE_KEY = "my_shared_image_url";
const fileInput = document.getElementById("fileInput");
const imgBox = document.getElementById("imgBox");

// 页面打开时自动显示图片
window.onload = () => {
  const url = localStorage.getItem(STORAGE_KEY);
  if (url) imgBox.innerHTML = `<img src="${url}" alt="展示图">`;
};

// 上传到图床
fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("image", file);
  formData.append("key", "215c509415f1310d488e62a728f35b98");

  try {
    const res = await fetch("https://api.imgbb.com/1/upload", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    const url = data.data.url;

    localStorage.setItem(STORAGE_KEY, url);
    imgBox.innerHTML = `<img src="${url}">`;
    alert("上传成功！现在别人打开也能看到啦");
  } catch (err) {
    alert("上传失败");
  }
};
</script>
</body>
</html>
